<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Romantic Puzzle</title>
  <style>
    body {
      background: pink;
      font-family: cursive;
      text-align: center;
    }
    #puzzle {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 2px;
      margin: 20px auto;
      width: 306px;
      border: 5px solid red;
    }
    .piece {
      width: 100px;
      height: 100px;
      background-size: 300px 300px;
      cursor: grab;
      border: 1px solid white;
    }
    #message {
      margin-top: 20px;
      font-size: 24px;
      color: crimson;
      text-shadow: 2px 2px 5px white;
    }
  </style>
</head>
<body>
  <h2>Romantic Puzzle for Hellen 💕</h2>
  <div id="puzzle"></div>
  <div id="message">Arrange the pieces!</div>

  <script>
    const puzzle = document.getElementById("puzzle");
    const message = document.getElementById("message");

    // Use your own romantic photo here
    const img = "photo.jpg"; // upload this file to your repo

    // Create 9 pieces
    let positions = [];
    for (let i = 0; i < 9; i++) positions.push(i);
    positions.sort(() => Math.random() - 0.5); // shuffle

    positions.forEach(pos => {
      const piece = document.createElement("div");
      piece.className = "piece";
      piece.style.backgroundImage = `url(${img})`;
      piece.style.backgroundPosition = 
        `${-(pos % 3) * 100}px ${-Math.floor(pos / 3) * 100}px`;
      piece.draggable = true;
      puzzle.appendChild(piece);
    });

    // Drag & Drop (PC)
    let dragged;
    puzzle.addEventListener("dragstart", e => dragged = e.target);
    puzzle.addEventListener("dragover", e => e.preventDefault());
    puzzle.addEventListener("drop", e => {
      if (e.target.className === "piece") {
        swapPieces(dragged, e.target);
      }
    });

    // Tap-to-Swap (Phone)
    let firstTap = null;
    puzzle.addEventListener("click", e => {
      if (e.target.className === "piece") {
        if (!firstTap) {
          firstTap = e.target;
          e.target.style.border = "2px solid gold"; // highlight
        } else {
          swapPieces(firstTap, e.target);
          firstTap.style.border = "1px solid white";
          firstTap = null;
        }
      }
    });

    // Swap function
    function swapPieces(p1, p2) {
      let temp = p1.style.backgroundPosition;
      p1.style.backgroundPosition = p2.style.backgroundPosition;
      p2.style.backgroundPosition = temp;
      checkSolved();
    }

    // Check if solved
    function checkSolved() {
      let solved = true;
      [...puzzle.children].forEach((piece, i) => {
        let correctX = -(i % 3) * 100 + "px";
        let correctY = -Math.floor(i / 3) * 100 + "px";
        if (piece.style.backgroundPosition !== correctX + " " + correctY) {
          solved = false;
        }
      });
      if (solved) {
        message.innerHTML = "💖 Forever Yours, Onesmus 💖";
        message.style.color = "gold";
        message.style.fontSize = "28px";

        // Optional: add music
        const audio = document.createElement("audio");
        audio.src = "romantic.mp3"; // upload this file too
        audio.autoplay = true;
        audio.loop = true;
        audio.controls = true;
        document.body.appendChild(audio);
      }
    }
  </script>
</body>
</html>
